<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardianes de la EF | Sandra - El Camino del Cazador Motriz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #060913;
            color: #f0f6fc;
            background-image: 
                radial-gradient(at 0% 0%, rgba(220, 38, 38, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%),
                radial-gradient(#ffffff03 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 30px 30px;
            margin: 0; padding: 0; overflow-x: hidden;
        }
        .font-demon { font-family: 'Cinzel', serif; }
        
        /* Tus tarjetas Apple Glass adaptadas a la estética Demon Slayer */
        .apple-glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .apple-glass:hover {
            transform: translateY(-6px);
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(220, 38, 38, 0.3);
            box-shadow: 0 20px 40px rgba(220, 38, 38, 0.1);
        }
        .gradient-text {
            background: linear-gradient(90deg, #ef4444, #f97316, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tag-badge {
            background: rgba(220, 38, 38, 0.08);
            border: 1px solid rgba(220, 38, 38, 0.2);
            backdrop-filter: blur(5px);
        }

        /* Modales Interactivos de Pantalla Completa con Scroll Limpio */
        .demon-modal {
            display: none; position: fixed; inset: 0; z-index: 100;
            background: rgba(4, 6, 14, 0.96); backdrop-filter: blur(20px);
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-scroll-box {
            width: 100%; max-width: 800px; max-height: 85vh;
            background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px; padding: 32px; overflow-y: auto; position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Estilos del vídeo vertical */
        .video-modal-content { width: 100%; max-width: 400px; position: relative; }
        .video-container {
            position: relative; padding-bottom: 177.77%; height: 0; overflow: hidden;
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .contact-btn {
            display: flex; align-items: center; justify-content: center; padding: 14px;
            border-radius: 16px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            color: white; font-size: 14px; transition: all 0.2s ease;
        }
        .contact-btn:hover { background: rgba(255,255,255,0.08); transform: translateY(-2px); }

        /* Efecto Hélice de Energía / Margarita */
        .margarita-container { position: relative; width: 96px; height: 96px; display: flex; items-center; justify-content: center; }
        .margarita-icon { font-size: 76px; color: #ef4444; filter: drop-shadow(0 0 15px rgba(239,68,68,0.4)); animation: rotate-margarita 25s linear infinite; }
        .margarita-center { position: absolute; width: 18px; height: 18px; background: #ffffff; border-radius: 50%; box-shadow: 0 0 15px #fff; z-index: 2; }
        @keyframes rotate-margarita { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Estilo Tabla de Unidades */
        .udi-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        .udi-table th { background: rgba(255,255,255,0.05); text-align: left; padding: 10px; color: #ef4444; border-bottom: 2px solid rgba(255,255,255,0.1);
