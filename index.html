<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardianes de la EF | Sandra - El Camino del Cazador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Shojumaru&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0c10;
            color: #c5c6c7;
            background-image: 
                radial-gradient(at 0% 0%, rgba(220, 38, 38, 0.15) 0px, transparent 50%), /* Respiración del Fuego */
                radial-gradient(at 100% 0%, rgba(14, 165, 233, 0.15) 0px, transparent 50%), /* Respiración del Agua */
                radial-gradient(at 50% 100%, rgba(234, 179, 8, 0.1) 0px, transparent 50%); /* Respiración del Rayo */
        }
        .font-anime {
            font-family: 'Shojumaru', cursive, system-ui;
        }
        .font-header {
            font-family: 'Montserrat', sans-serif;
        }
        .glass-panel {
            background: rgba(31, 41, 55, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .nichirin-border-fire {
            border-left: 4px solid #ef4444;
        }
        .nichirin-border-water {
            border-left: 4px solid #0ea5e9;
        }
        .nichirin-border-thunder {
            border-left: 4px solid #eab308;
        }
        .contact-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .contact-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between selection:bg-red-600 selection:text-white">

    <nav class="w-full max-w-5xl mx-auto px-6 py-4 flex justify-between items-center border-b border-gray-800/60">
        <div class="flex items-center space-x-3">
            <span class="text-2xl font-anime text-red-500 tracking-wider">鬼</span>
            <span class="font-header font-black text-xl tracking-tighter text-white">GUARDIANES <span class="text-red-500">EF</span></span>
        </div>
        <div class="flex items-center space-x-2 text-sm text-gray-400">
            <span class="inline-block w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
            <span>Sede Central de Cazadores: Jaén</span>
        </div>
    </nav>

    <main class="w-full max-w-5xl mx-auto px-4 sm:px-6 py-8 flex-grow grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <section class="lg:col-span-2 space-y-6">
            
            <div class="glass-panel rounded-2xl p-6 sm:p-8 space-y-6 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-red-500/5 rounded-full blur-3xl -mr-10 -mt-10"></div>
                
                <div class="flex items-center space-x-3 border-b border-gray-800 pb-4">
                    <i class="fa-solid fa-scroll text-2xl text-red-500"></i>
